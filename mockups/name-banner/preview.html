<!doctype html>
<html><head><meta charset="utf-8"><title>name lattice banner preview</title>
<style>
  body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; }
  .pane { padding: 36px 40px; display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
  .pane.dark  { background:#06070b; color:#9aa4b2; }
  .pane.light { background:#e9edf3; color:#5a6573; }
  .label { font: 12px ui-monospace, monospace; letter-spacing:.14em; text-transform:uppercase; }
  img { max-width: 100%; }
</style></head>
<body>
  <div class="pane dark">
    <span class="label">dark · lattice (flowing wires, toggles individual ↔ LLM span)</span>
    <img src="name-lattice-dark.svg" alt="dark lattice">
  </div>
  <div class="pane light">
    <span class="label">light · lattice</span>
    <img src="name-lattice-light.svg" alt="light lattice">
  </div>
</body></html>
