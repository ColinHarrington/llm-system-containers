<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llm-system-containers · GUI mockups</title>
<style>
  :root {
    --bar-h: 52px;
    --bg: #0d1117;
    --bar: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-soft: rgba(88,166,255,.15);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    height: var(--bar-h);
    flex: 0 0 var(--bar-h);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 14px;
    background: var(--bar);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .brand {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    margin-right: 4px;
  }
  .brand b { font-size: 13px; letter-spacing: .2px; }
  .brand span { font-size: 11px; color: var(--muted); }
  .tabs { display: flex; gap: 6px; }
  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background .12s, border-color .12s;
  }
  .tab:hover { background: #1f242c; }
  .tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .tab .key {
    font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
  }
  .tab.active .key { color: var(--accent); border-color: var(--accent); }
  .tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .spacer { flex: 1; }
  .meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 14px; }
  .meta a { color: var(--accent); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .badge {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 9px;
  }
  main { flex: 1; position: relative; background: #fff; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
  .desc {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--bar);
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 7px 14px;
    display: none;
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <b>llm-system-containers</b>
      <span>GUI mockups · pick a direction</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="spacer"></div>
    <div class="meta">
      <span class="badge">static mockups</span>
      <a id="standalone" href="#" target="_blank" rel="noopener">open standalone ↗</a>
    </div>
  </header>
  <main>
    <iframe id="viewer" title="mockup viewer"></iframe>
  </main>

<script>
  const variants = [
    { id: "a", dir: "a-devtool",      label: "A · Developer tool",     color: "#58a6ff",
      blurb: "Dense, dark, keyboard-friendly. Linear / lazydocker / Railway vibe." },
    { id: "b", dir: "b-approachable", label: "B · Approachable",       color: "#3fb950",
      blurb: "Clean, light, generous whitespace. Docker Desktop / OrbStack / Tailscale vibe." },
    { id: "c", dir: "c-controlroom",  label: "C · Control-room",       color: "#d29922",
      blurb: "Data-forward panels & charts. Grafana / mission-control vibe." },
    { id: "n", dir: "nested-view",    label: "Topology (rich)",        color: "#a371f7", sep: true,
      blurb: "Nested map: VM -> sandboxes -> agents, with per-agent activity + tool icons." },
    { id: "s", dir: "nested-simple",  label: "Topology (MVP)",         color: "#a371f7",
      blurb: "Nested map, simplified: agents listed only, no per-agent status." },
    { id: "net", dir: "networking",   label: "Networking",             color: "#2dd4bf",
      blurb: "VM networks and which sandboxes attach to which; egress + inspection." },
    { id: "sec", dir: "security",     label: "Security & profiles",    color: "#f778ba",
      blurb: "Guardrails (file/syscall/network ACLs) + reusable agent profiles." },
  ];

  const tabsEl = document.getElementById("tabs");
  const viewer = document.getElementById("viewer");
  const standalone = document.getElementById("standalone");
  let current = null;

  function select(id) {
    const v = variants.find(x => x.id === id) || variants[0];
    current = v.id;
    const url = v.dir + "/index.html";
    viewer.src = url;
    standalone.href = url;
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.id === v.id);
    });
    document.title = "mockups · " + v.label;
    location.hash = v.id;
  }

  variants.forEach((v, i) => {
    if (v.sep) {
      const d = document.createElement("div");
      d.style.cssText = "width:1px;height:26px;background:var(--border);margin:0 4px;flex:0 0 auto;";
      tabsEl.appendChild(d);
    }
    const b = document.createElement("button");
    b.className = "tab";
    b.dataset.id = v.id;
    b.title = v.blurb;
    b.innerHTML =
      '<span class="dot" style="background:' + v.color + '"></span>' +
      '<span>' + v.label + '</span>' +
      '<span class="key">' + (i + 1) + '</span>';
    b.addEventListener("click", () => select(v.id));
    tabsEl.appendChild(b);
  });

  // keyboard: 1/2/3 and arrow keys
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (/^[1-9]$/.test(e.key) && +e.key <= variants.length) select(variants[+e.key - 1].id);
    if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
      const idx = variants.findIndex(v => v.id === current);
      const next = (idx + (e.key === "ArrowRight" ? 1 : variants.length - 1)) % variants.length;
      select(variants[next].id);
    }
  });

  const initial = (location.hash || "#a").slice(1);
  select(variants.some(v => v.id === initial) ? initial : "a");
</script>
</body>
</html>
